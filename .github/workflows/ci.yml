name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Test scaffold (smoke test)
        run: |
          mkdir /tmp/test-workspace
          learning-os init /tmp/test-workspace --tool cursor
          ls /tmp/test-workspace/.cursor/skills/
          ls /tmp/test-workspace/.cursor/hooks/
          ls /tmp/test-workspace/.learning-os/hooks/
          ls /tmp/test-workspace/courses/
